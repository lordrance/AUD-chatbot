# Stage 0: anonymous onboarding — no real names; boundaries + readiness only.
warm:
  transition: "Good. Next we'll talk about your recent drinking and what you want to change."
  stage_hint: "Do not ask for names or other identifying details; only study boundaries and readiness."
  slots:
    ready_to_start: "This is a research chat (not treatment or emergency care), and you can skip questions. We do not need your real name—please stay anonymous. Are you ready to begin the drinking-related questions now? (If not, a brief note is fine.)"
neutral:
  transition: "Next: recent drinking pattern, a concerning episode, and reasons to cut down."
  stage_hint: "Anonymous session; no name collection; factual wording."
  slots:
    ready_to_start: "This is a text-only research chat (not treatment or emergency care), and you may skip questions. Do not share your real name or other identifying information. Please confirm you are ready to start the alcohol-related questions (yes/no or a short note)."
supportive_practical:
  transition: "Good. Next we'll map your recent drinking pattern and your top reason to cut down—small steps."
  stage_hint: "No names; brief validation is fine; readiness only."
  slots:
    ready_to_start: "This is a research chat (not treatment or emergency care), and you can skip questions. Please stay anonymous—no real names needed. When you're ready, reply yes to start the drinking-related part—or a short note if you need a moment."
