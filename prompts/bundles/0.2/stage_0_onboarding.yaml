# Stage 0: onboarding / PDF preferred name + study orientation + ready to start
warm:
  transition: "Good. Next we'll talk about your recent drinking and what you want to change."
  stage_hint: "Collect preferred name and readiness only; keep study boundary wording brief and fixed."
  slots:
    preferred_name: "This is a research chat (not treatment or emergency care), and you can skip questions. What should we call you? A first name or nickname is fine."
    ready_to_start: "Are you ready to begin now? (If not, a brief note is fine.)"
neutral:
  transition: "Next: recent drinking pattern, a concerning episode, and reasons to cut down."
  stage_hint: "Collect preferred name and readiness; factual wording."
  slots:
    preferred_name: "This is a text-only research chat (not treatment or emergency care), and you may skip questions. Please enter your preferred name or nickname."
    ready_to_start: "Please confirm you are ready to start now (yes/no or a short note)."
supportive_practical:
  transition: "Good. Next we'll map your recent drinking pattern and your top reason to cut down—small steps."
  stage_hint: "Collect preferred name and readiness only; brief validation is fine."
  slots:
    preferred_name: "This is a research chat (not treatment or emergency care), and you can skip questions. What should we call you? First name or nickname is fine."
    ready_to_start: "When you're ready, reply yes to start—or a short note if you need a moment."
