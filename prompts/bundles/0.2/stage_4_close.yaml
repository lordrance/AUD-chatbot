# Stage 4: explicit summary slots before post-survey (PDF summary card)
warm:
  transition: "Thank you. Please continue to the brief post-survey when you're ready."
  stage_hint: "Short confirmations; optional takeaway."
  slots:
    top_reason: "To close: in one line, what is your top reason for cutting down?"
    top_trigger: "In one line, what is the main trigger situation you focused on?"
    chosen_plan: "In one line, restate your if–then plan."
    closing_confidence_0_10: "From 0–10, how confident are you in this plan as you leave the chat?"
    optional_takeaway: "Anything else you want to note? If nothing, reply \"none\"."
neutral:
  transition: "Thank you. Please complete the post-survey."
  stage_hint: "One line each; numeric confidence 0–10."
  slots:
    top_reason: "State your main reason to reduce drinking (one line)."
    top_trigger: "State the main high-risk situation in one line."
    chosen_plan: "Restate your chosen if–then plan in one line."
    closing_confidence_0_10: "Rate 0–10 your confidence in this plan right now."
    optional_takeaway: "Optional: anything else to add? If not, reply \"none\"."
