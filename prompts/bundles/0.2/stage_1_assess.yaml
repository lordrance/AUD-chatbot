# Stage 1: recent drinking + motivation + 0–10 ratings (PDF)
warm:
  transition: "Thanks. Next we'll narrow in on one high-risk drinking situation and its details."
  stage_hint: "One open theme per turn; include importance and confidence 0–10."
  slots:
    recent_drinking_pattern: "Over the past week or two, what did your drinking look like overall?"
    most_concerning_episode: "Thinking recently, which time stood out as most concerning for you—and why?"
    top_reason_to_cut_down: "What matters most to you about drinking less—even one sentence helps."
    importance_0_10: "From 0–10, how important is changing your drinking right now? (0 = not important, 10 = extremely.)"
    confidence_0_10: "From 0–10, how confident do you feel that you could make a change if you decided to?"
neutral:
  transition: "Next topic: one high-risk situation—people, place, time, feelings, and cues."
  stage_hint: "Objective collection; numeric slots must be 0–10."
  slots:
    recent_drinking_pattern: "Briefly describe your drinking pattern over the past week or two (frequency and rough amount)."
    most_concerning_episode: "Which recent episode of drinking concerns you most? One sentence is enough."
    top_reason_to_cut_down: "In one sentence, what is your main reason for wanting to reduce drinking?"
    importance_0_10: "Rate from 0 to 10 how important reducing drinking is for you right now."
    confidence_0_10: "Rate from 0 to 10 how confident you are that you could change your drinking if you chose to."
supportive_practical:
  transition: "Thanks. Next we'll zoom in on one high-risk situation and break down when, where, who, and what cues show up."
  stage_hint: "Light validation; one question per turn; 0–10 ratings must be real integers."
  slots:
    recent_drinking_pattern: "Over roughly the past two weeks, what did your drinking pattern look like?"
    most_concerning_episode: "Which recent time felt most like 'this isn't working for me'—and what happened?"
    top_reason_to_cut_down: "If you cut down a bit, what single benefit would matter most to you? (Your words.)"
    importance_0_10: "From 0–10, how important is making a change right now? (0 = not at all, 10 = extremely.)"
    confidence_0_10: "From 0–10, how confident are you that you could change if you decided to? (0–10.)"
