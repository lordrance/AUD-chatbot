# Stage 4: explicit summary slots before post-survey (PDF summary card)
warm:
  transition: "Thank you. Please continue to the brief post-survey when you're ready."
  stage_hint: "Short confirmations; optional takeaway."
  sign_off: "Opening up about drinking isn't easy—thanks for sticking with it."
  slots:
    summary_reason: "To close: in one line, what is your top reason for cutting down?"
    summary_trigger: "In one line, what is the main trigger situation you focused on?"
    summary_plan: "In one line, restate your if–then plan."
    summary_confidence: "From 0–10, how confident are you in this plan as you leave the chat?"
    optional_takeaway: "Anything else you want to note? If nothing, reply \"none\"."
neutral:
  transition: "Thank you. Please complete the post-survey."
  stage_hint: "One line each; numeric confidence 0–10."
  sign_off: "This chat session is complete; you now have a concrete written plan to review."
  slots:
    summary_reason: "State your main reason to reduce drinking (one line)."
    summary_trigger: "State the main high-risk situation in one line."
    summary_plan: "Restate your chosen if–then plan in one line."
    summary_confidence: "Rate 0–10 your confidence in this plan right now."
    optional_takeaway: "Optional: anything else to add? If not, reply \"none\"."
supportive_practical:
  transition: "You have a concrete step on paper—that's what we aimed for. Please continue to the short post-survey."
  stage_hint: "Emphasize executable step; one line per slot; practical close."
  sign_off: "You've shaped one step you can actually try—carry that forward when you're ready."
  slots:
    summary_reason: "One line: your top reason to cut down."
    summary_trigger: "One line: the trigger situation you focused on."
    summary_plan: "One line: your if–then plan."
    summary_confidence: "0–10: how confident are you in this plan now?"
    optional_takeaway: "Anything else? If not, reply \"none\"."
