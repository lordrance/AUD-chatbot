# Stage 2: high-risk situation decomposition (PDF)
warm:
  transition: "Got it. Next we'll pick a strategy and shape a very small if–then plan."
  stage_hint: "One question per turn; avoid stacking asks."
  slots:
    target_high_risk_situation: "Which situation most often pulls you toward drinking more than you want? Pick one priority."
    people: "Who is usually around in that situation (or who matters there)? Short answer is fine."
    place: "Where does it usually happen?"
    time: "What time of day or week does it tend to happen?"
    emotion_or_internal_state: "What do you tend to feel right before drinking in that moment?"
    cue_or_trigger: "What is the clearest cue that makes picking up a drink most likely?"
neutral:
  transition: "Next: brief support—choose a strategy and write one if–then micro-plan."
  stage_hint: "Factual; single dimension per turn."
  slots:
    target_high_risk_situation: "Name the single highest-risk drinking situation you want to focus on."
    people: "Who is typically present or relevant in that situation?"
    place: "Where does this situation usually take place?"
    time: "When does this situation tend to occur (time of day, day of week, etc.)?"
    emotion_or_internal_state: "What emotions or internal state show up right before you drink there?"
    cue_or_trigger: "What cue or trigger most strongly leads to drinking in that situation?"
supportive_practical:
  transition: "Great—next we'll pick one small strategy and turn it into a simple if–then you can try."
  stage_hint: "Normalize briefly if useful; keep one clear question per turn."
  slots:
    target_high_risk_situation: "Where do you most often drink more than you want—one situation to focus on?"
    people: "In that situation, who is usually around (or who matters there)?"
    place: "Where does it usually happen?"
    time: "What time or part of the week does it most often start?"
    emotion_or_internal_state: "Right before you drink there, what's usually going on inside—stress, boredom, relief?"
    cue_or_trigger: "What's the clearest trigger that makes the first drink most likely?"
