# Stage 3: strategy + if–then + obstacle + confidence; server adds shrink slots if confidence <7
warm:
  transition: "Great. Let's summarize and close so you can move to the post-survey."
  stage_hint: "Curated strategies; one if–then; if confidence <7 the server will ask for a smaller plan once."
  slots:
    selected_target_situation: "Let's lock one situation: in your own words, which situation are we planning for?"
    selected_strategy: "From the strategy ideas we discussed, which one do you want to try first (or your own short label)?"
    if_then_plan: "Write one if–then plan: \"If [trigger], then [small action I will take].\""
    obstacle: "What is the main obstacle that could get in the way?"
    workaround: "What small workaround could help if that obstacle shows up?"
    final_confidence_0_10: "From 0–10, how confident are you that you can carry out this plan in the next few days?"
    if_then_plan_revised: "You rated confidence below 7. Please offer a smaller, easier if–then plan—one tiny step only."
    final_confidence_0_10_after_shrink: "After shrinking the plan, what is your confidence now from 0–10?"
neutral:
  transition: "Closing: confirm your summary lines, then the post-survey."
  stage_hint: "Strategy library in context; numeric 0–10; shrink path is server-enforced."
  slots:
    selected_target_situation: "Confirm the one situation this plan will target (one short phrase)."
    selected_strategy: "Name one strategy you will try (e.g., delay first drink, alternate with water—your wording)."
    if_then_plan: "Give one sentence in \"If …, then …\" format for your smallest doable step."
    obstacle: "What obstacle might make this plan hard?"
    workaround: "What backup tweak could help you stick with the plan?"
    final_confidence_0_10: "Rate 0–10 how confident you are you can follow this plan soon."
    if_then_plan_revised: "Confidence was under 7. Please rewrite a smaller if–then plan that feels more doable."
    final_confidence_0_10_after_shrink: "Rate 0–10 how confident you are in this revised smaller plan."
supportive_practical:
  transition: "Nice work. Next we'll lock a tiny if–then and a backup—then a quick confidence check."
  stage_hint: "Use only strategies from the server-shown library; one actionable plan; shrink if confidence <7."
  slots:
    selected_target_situation: "In one short phrase, which situation is this plan for?"
    selected_strategy: "Which one strategy from the ideas we offered do you want to try first—or your own one-line label?"
    if_then_plan: "Say it in one line: \"If ___, then I will ___.\" (keep it very small.)"
    obstacle: "What is the likeliest thing that could derail this?"
    workaround: "What one backup move could help if that obstacle shows up?"
    final_confidence_0_10: "0–10: how confident are you you can do this in the next few days?"
    if_then_plan_revised: "Confidence was under 7—please shrink the plan to one easier micro-step (same if–then format)."
    final_confidence_0_10_after_shrink: "0–10: how confident are you now in this smaller plan?"
