# 本地开发 / 验收：仅启动 db 即可跑 Alembic 与 DB 集成测试（见 scripts/acceptance-local.*）
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: safechat
      POSTGRES_PASSWORD: safechat
      POSTGRES_DB: safechat_aud
    ports:
      - "5432:5432"
    volumes:
      - safechat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safechat -d safechat_aud"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://safechat:safechat@db:5432/safechat_aud
      API_HOST: 0.0.0.0
      API_PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  safechat_pgdata:
